openapi: 3.1.0
info:
  title: laravel-blog-manager API
  version: "0.2"
  description: >
    Optional JSON API over the blog-manager services (off by default; enable via
    `config('blog-manager.api.enabled')`). All resource ids are opaque ULIDs — the
    internal numeric key is never exposed. Every block is returned as a `{ source,
    payload }` pair: `source` is the raw stored data (e.g. markdown), `payload` is
    the sanitized, presentation-ready output — so any frontend can consume server
    HTML or re-theme from the raw source. Errors render as a stable envelope
    (`error_code` + `error_key`); see docs/errors.md.
  license:
    name: MIT
servers:
  - url: "{scheme}://{host}/{prefix}"
    description: Host application, under the configured API prefix.
    variables:
      scheme:
        default: https
      host:
        default: example.test
      prefix:
        default: blog/api
        description: config('blog-manager.api.prefix')

tags:
  - name: Posts
  - name: Blocks
  - name: Media

security:
  - hostAuth: []

paths:
  /posts:
    get:
      tags: [Posts]
      summary: List posts (paginated)
      description: >
        Returns published posts only, unless the caller holds `blog.post.update`
        (author view), in which case drafts and scheduled posts are included. Open
        endpoint — visibility is filtered, not gated.
      security: []
      parameters:
        - { in: query, name: page, schema: { type: integer, minimum: 1 } }
      responses:
        "200":
          description: A page of posts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostPage" }
    post:
      tags: [Posts]
      summary: Create a post
      description: "Ability: `blog.post.create`. New posts start as `draft`."
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostWriteRequest" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostEnvelope" }
        "422": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /posts/{post}:
    parameters:
      - { in: path, name: post, required: true, schema: { type: string }, description: Post public id (ULID). }
    get:
      tags: [Posts]
      summary: Read a post with its ordered, rendered blocks
      description: >
        Returns the post and its blocks in authored order. A hidden (draft/scheduled)
        post is a 404 to a caller lacking `blog.post.update` — scope before authorize,
        so existence is never confirmed. Open endpoint.
      security: []
      responses:
        "200":
          description: The post with blocks.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostWithBlocksEnvelope" }
        "404": { $ref: "#/components/responses/Error" }
    put:
      tags: [Posts]
      summary: Update a post's attributes
      description: "Ability: `blog.post.update`."
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostWriteRequest" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostEnvelope" }
        "404": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
    delete:
      tags: [Posts]
      summary: Delete a post (cascades blocks, retains media)
      description: "Ability: `blog.post.delete`."
      responses:
        "204": { description: Deleted. }
        "404": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /posts/{post}/publish:
    parameters:
      - { in: path, name: post, required: true, schema: { type: string } }
    post:
      tags: [Posts]
      summary: Publish (or schedule) a post
      description: >
        Ability: `blog.post.update`. Sets the post `published`. Omit `published_at`
        to publish now; a future `published_at` schedules it (Published, but not
        visible until that time — there is no separate "scheduled" state).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                published_at:
                  type: [string, "null"]
                  format: date-time
      responses:
        "200":
          description: Published.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostEnvelope" }
        "404": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /posts/{post}/unpublish:
    parameters:
      - { in: path, name: post, required: true, schema: { type: string } }
    post:
      tags: [Posts]
      summary: Return a post to draft
      description: "Ability: `blog.post.update`. Clears `published_at`."
      responses:
        "200":
          description: Unpublished.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostEnvelope" }
        "404": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /posts/{post}/blocks:
    parameters:
      - { in: path, name: post, required: true, schema: { type: string } }
    post:
      tags: [Blocks]
      summary: Append a block (takes the next position)
      description: >
        Ability: `blog.block.manage`. `type` is a registered block key
        (heading/paragraph/image/video/file). Media blocks reference a stored media
        item by `media_id`; its kind must match the block type.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BlockWriteRequest" }
      responses:
        "201":
          description: Appended.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BlockEnvelope" }
        "422": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /posts/{post}/blocks/reorder:
    parameters:
      - { in: path, name: post, required: true, schema: { type: string } }
    post:
      tags: [Blocks]
      summary: Reorder a post's blocks
      description: >
        Ability: `blog.block.manage`. `order` must list exactly the post's block
        public ids in the new order; positions stay contiguous 0..n-1.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order]
              properties:
                order:
                  type: array
                  items: { type: string }
      responses:
        "204": { description: Reordered. }
        "422": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /blocks/{block}:
    parameters:
      - { in: path, name: block, required: true, schema: { type: string }, description: Block public id (ULID). }
    put:
      tags: [Blocks]
      summary: Update a block's payload (within its type)
      description: "Ability: `blog.block.manage`."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BlockEnvelope" }
        "422": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
    delete:
      tags: [Blocks]
      summary: Remove a block (remaining blocks re-sequenced)
      description: "Ability: `blog.block.manage`."
      responses:
        "204": { description: Removed. }
        "403": { $ref: "#/components/responses/Error" }

  /media:
    post:
      tags: [Media]
      summary: Store a media item (multipart upload)
      description: >
        Ability: `blog.media.upload`. Validates MIME + size against the configured
        allow-lists; the kind (image/video/file) is derived from the MIME type.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "201":
          description: Stored.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MediaEnvelope" }
        "422": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /media/{media}:
    parameters:
      - { in: path, name: media, required: true, schema: { type: string }, description: Media public id (ULID). }
    delete:
      tags: [Media]
      summary: Delete a media item
      description: >
        Ability: `blog.media.delete`. Refused (409) while any block still references
        the item — detach/remove the block first.
      responses:
        "204": { description: Deleted. }
        "409": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

components:
  securitySchemes:
    hostAuth:
      type: http
      scheme: bearer
      description: >
        Whatever the host configures in `config('blog-manager.api.middleware')`
        (e.g. `auth:sanctum`). The package does not define the auth mechanism; write
        operations additionally check an ability through the pluggable authorizer.

  responses:
    Error:
      description: A package error envelope (stable error_code + error_key).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    PostStatus:
      type: string
      enum: [draft, published]

    Post:
      type: object
      properties:
        id: { type: string, description: Opaque ULID. }
        title: { type: string }
        slug: { type: string }
        author_id: { type: [integer, "null"] }
        status: { $ref: "#/components/schemas/PostStatus" }
        published_at: { type: [string, "null"], format: date-time }
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }
      required: [id, title, slug, status]

    Block:
      type: object
      description: A block as a source/payload pair.
      properties:
        id: { type: string }
        type: { type: string, example: paragraph }
        position: { type: integer }
        source:
          type: object
          additionalProperties: true
          description: >
            Raw, UNSANITIZED stored data (shape varies by type, e.g. { format, content }).
            For editors and client-side re-rendering only — never inject it into the DOM as
            HTML without your own sanitizer. Use `payload` for safe, ready-to-render output.
        payload:
          type: object
          additionalProperties: true
          description: Sanitized, presentation-ready output (e.g. { format, html }).
        media_id: { type: [string, "null"], description: Referenced media public id, if any. }
      required: [id, type, position, source, payload]

    PostWithBlocks:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        slug: { type: string }
        author_id: { type: [integer, "null"] }
        status: { $ref: "#/components/schemas/PostStatus" }
        published_at: { type: [string, "null"], format: date-time }
        blocks:
          type: array
          items: { $ref: "#/components/schemas/Block" }
      required: [id, title, slug, status, blocks]

    Media:
      type: object
      properties:
        id: { type: string }
        kind: { type: string, enum: [image, video, file] }
        mime: { type: string }
        size: { type: integer }
        filename: { type: string }
        url: { type: [string, "null"] }
      required: [id, kind, mime, size, filename]

    PostWriteRequest:
      type: object
      properties:
        title: { type: string }
        slug: { type: string, description: Optional; derived from title and made unique when omitted. }
        author_id: { type: [integer, "null"] }
      required: [title]

    BlockWriteRequest:
      type: object
      properties:
        type: { type: string, example: paragraph }
        data: { type: object, additionalProperties: true }
        media_id: { type: [string, "null"] }
      required: [type]

    Error:
      type: object
      properties:
        error_code: { type: integer, example: 3001 }
        error_key: { type: string, example: blog.media.validation_failed }
        message: { type: string }
      required: [error_code, error_key, message]

    PostEnvelope:
      type: object
      properties:
        data: { $ref: "#/components/schemas/Post" }
      required: [data]

    PostWithBlocksEnvelope:
      type: object
      properties:
        data: { $ref: "#/components/schemas/PostWithBlocks" }
      required: [data]

    BlockEnvelope:
      type: object
      properties:
        data: { $ref: "#/components/schemas/Block" }
      required: [data]

    MediaEnvelope:
      type: object
      properties:
        data: { $ref: "#/components/schemas/Media" }
      required: [data]

    PostPage:
      type: object
      description: Laravel paginated resource collection.
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Post" }
        links: { type: object, additionalProperties: true }
        meta: { type: object, additionalProperties: true }
      required: [data]
