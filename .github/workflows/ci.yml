name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Pest · PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }} · ${{ matrix.stability }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        laravel: ['12.*', '13.*']
        stability: ['prefer-stable', 'prefer-lowest']
        include:
          - laravel: '12.*'
            testbench: '10.*'
          - laravel: '13.*'
            testbench: '11.*'
        exclude:
          # Laravel 13 (testbench 11) requires PHP >= 8.3.
          - laravel: '13.*'
            php: '8.2'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, mbstring, fileinfo, sqlite3, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: |
          composer require --dev --no-interaction --no-update \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}"
          composer update --prefer-dist --${{ matrix.stability }} --no-interaction

      - name: Run test suite
        run: vendor/bin/pest

  quality:
    name: Quality · Pint + Larastan + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, mbstring, fileinfo, sqlite3, pdo_sqlite
          coverage: pcov

      - name: Install dependencies
        run: composer update --prefer-dist --prefer-stable --no-interaction

      - name: Check formatting (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (Larastan)
        run: vendor/bin/phpstan analyse --memory-limit=1G

      # Baseline 93.8% (green CI run, 2026-07-02); gated at 90% for headroom.
      - name: Coverage (min 90%)
        run: vendor/bin/pest --coverage --min=90
