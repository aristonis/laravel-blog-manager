name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Pest · PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11.*', '12.*', '13.*']
        include:
          - laravel: '11.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '10.*'
          - laravel: '13.*'
            testbench: '11.*'
        exclude:
          # Laravel 13 (testbench 11) requires PHP >= 8.3.
          - laravel: '13.*'
            php: '8.2'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, mbstring, fileinfo, sqlite3, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: |
          composer require --dev --no-interaction --no-update \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}"
          composer update --prefer-dist --prefer-stable --no-interaction

      - name: Run test suite
        run: vendor/bin/pest

  quality:
    name: Quality · Pint + Larastan + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, mbstring, fileinfo, sqlite3, pdo_sqlite
          coverage: pcov

      - name: Install dependencies
        run: composer update --prefer-dist --prefer-stable --no-interaction

      - name: Check formatting (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (Larastan)
        run: vendor/bin/phpstan analyse --memory-limit=1G

      # Coverage is reported, not gated: the enforced --min threshold will be
      # added once a green CI run establishes the real baseline (no PCOV locally).
      - name: Coverage (report only)
        run: vendor/bin/pest --coverage
