name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Pest · PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }} · ${{ matrix.stability }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        laravel: ['12.*', '13.*']
        stability: ['prefer-stable', 'prefer-lowest']
        include:
          - laravel: '12.*'
            testbench: '10.*'
          - laravel: '13.*'
            testbench: '11.*'
        exclude:
          # Laravel 13 (testbench 11) requires PHP >= 8.3.
          - laravel: '13.*'
            php: '8.2'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, mbstring, fileinfo, sqlite3, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: |
          composer require --dev --no-interaction --no-update \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}"
          composer update --prefer-dist --${{ matrix.stability }} --no-interaction

      - name: Run test suite
        run: vendor/bin/pest

  databases:
    name: DB · PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }} · ${{ matrix.db }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']
        laravel: ['13.*']
        db: [mysql, pgsql]
        include:
          - laravel: '13.*'
            testbench: '11.*'
          - db: mysql
            port: 3306
          - db: pgsql
            port: 5432

    services:
      # Both containers start for every leg; each leg points Testbench at the one
      # named by matrix.db via the DB_* env below. Throwaway credentials — CI only.
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: blog_manager_test
          MYSQL_USER: blog_manager
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: blog_manager_test
          POSTGRES_USER: blog_manager
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U blog_manager -d blog_manager_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          # The main matrix extensions plus the PG/MySQL clients — CI-only; nothing
          # here is added to composer.json require (NFR-36).
          extensions: dom, mbstring, fileinfo, sqlite3, pdo_sqlite, pdo_mysql, pdo_pgsql
          coverage: none

      - name: Install dependencies
        run: |
          composer require --dev --no-interaction --no-update \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}"
          composer update --prefer-dist --prefer-stable --no-interaction

      - name: Run test suite against ${{ matrix.db }}
        env:
          DB_CONNECTION: ${{ matrix.db }}
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ matrix.port }}
          DB_DATABASE: blog_manager_test
          DB_USERNAME: blog_manager
          DB_PASSWORD: secret
        run: vendor/bin/pest

  quality:
    name: Quality · Pint + Larastan + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, mbstring, fileinfo, sqlite3, pdo_sqlite
          coverage: pcov

      - name: Install dependencies
        run: composer update --prefer-dist --prefer-stable --no-interaction

      - name: Check formatting (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (Larastan)
        run: vendor/bin/phpstan analyse --memory-limit=1G

      # Baseline 93.8% (green CI run, 2026-07-02); gated at 90% for headroom.
      - name: Coverage (min 90%)
        run: vendor/bin/pest --coverage --min=90
